<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Titan Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Cores personalizadas para o estilo Smart/Premium */
        .bg-gym-black { background-color: #111111; }
        .bg-gym-gold { background-color: #FFC107; }
        .text-gym-gold { color: #FFC107; }
        .border-gym-gold { border-color: #FFC107; }
        .hover-gym-gold:hover { background-color: #e6af06; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen text-gray-200">

    <nav class="bg-gym-black border-b border-zinc-800 shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-4">
                    <img src="ACADEMIA LOGO.png" alt="Titan Gym Logo" class="h-12 w-auto filter brightness-110">
                    <span class="font-black text-2xl tracking-tighter uppercase italic text-white">
                        Titan<span class="text-gym-gold">Gym</span>
                    </span>
                </div>
          
                <div id="userInfo" class="hidden flex items-center gap-6">
                    <span id="userEmail" class="text-sm font-bold uppercase tracking-widest text-zinc-400"></span>
                    <button id="btnLogout" class="bg-gym-gold text-black hover:bg-yellow-500 px-6 py-2 rounded-full text-xs font-black uppercase transition duration-300 shadow-lg">
                        <i class="fas fa-power-off mr-2"></i>Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <div id="loginSection" class="max-w-md mx-auto bg-gym-black rounded-2xl shadow-2xl border border-zinc-800 overflow-hidden p-10 mt-10">
            <div class="text-center mb-10">
                <img src="ACADEMIA LOGO.png" alt="Logo" class="h-20 mx-auto mb-4">
                <h2 class="text-3xl font-black uppercase italic text-white">Acesso <span class="text-gym-gold">Staff</span></h2>
                <p class="text-xs text-zinc-500 mt-2 uppercase tracking-widest">Área restrita de gerenciamento</p>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase text-zinc-400 mb-2">Usuário</label>
                    <input type="text" id="usuario" required class="w-full bg-zinc-800 border-0 rounded-lg py-3 px-4 text-white focus:ring-2 focus:ring-gym-gold outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-zinc-400 mb-2">Senha</label>
                    <input type="password" id="password" required class="w-full bg-zinc-800 border-0 rounded-lg py-3 px-4 text-white focus:ring-2 focus:ring-gym-gold outline-none transition">
                </div>
                <button type="submit" class="w-full flex justify-center py-4 px-4 rounded-lg shadow-xl text-sm font-black uppercase tracking-widest text-black bg-gym-gold hover-gym-gold transition duration-300 transform hover:scale-[1.02]">
                    Entrar no Painel
                </button>
                <div id="loginError" class="hidden text-red-500 text-xs font-bold text-center mt-2 uppercase">Credenciais inválidas!</div>
            </form>
        </div>

        <div id="adminSection" class="hidden space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gym-black rounded-xl shadow-xl p-8 border-l-4 border-gym-gold flex items-center">
                    <div class="p-4 rounded-lg bg-zinc-800 text-gym-gold mr-5">
                        <i class="fas fa-users text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-xs text-zinc-500 font-bold uppercase tracking-widest">Total de Alunos</p>
                        <p id="totalCharadas" class="text-3xl font-black text-white">0</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row gap-8">
                
                <div class="w-full lg:w-1/3">
                    <div class="bg-gym-black rounded-xl shadow-xl p-8 border border-zinc-800 sticky top-6">
                        <h3 id="formTitle" class="text-xl font-black text-white uppercase italic mb-6 border-b border-zinc-800 pb-4">
                            <span class="text-gym-gold">Novo</span> Aluno
                        </h3>
                        
                        <form id="charadaForm" class="space-y-5">
                            <input type="hidden" id="charadaId">
                            
                            <div>
                                <label class="block text-xs font-bold uppercase text-zinc-400 mb-2">CPF do Atleta</label>
                                <input type="text" id="pergunta" placeholder="000.000.000-00" required class="w-full bg-zinc-800 border-0 rounded-lg py-3 px-4 text-white focus:ring-2 focus:ring-gym-gold outline-none transition">
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold uppercase text-zinc-400 mb-2">Nome Completo</label>
                                <input type="text" id="resposta" placeholder="Nome do aluno" required class="w-full bg-zinc-800 border-0 rounded-lg py-3 px-4 text-white focus:ring-2 focus:ring-gym-gold outline-none transition">
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold uppercase text-zinc-400 mb-2">Status do Plano</label>
                                <select class="w-full bg-zinc-800 border-0 rounded-lg py-3 px-4 text-white focus:ring-2 focus:ring-gym-gold outline-none transition uppercase text-xs font-bold">
                                    <option>Ativo</option>
                                    <option>Inativo</option>
                                    <option>Pendente</option>
                                </select>
                            </div>

                            <div class="flex gap-3 pt-4">
                                <button type="submit" class="flex-1 bg-gym-gold text-black py-3 px-4 rounded-lg shadow-lg text-xs font-black uppercase hover-gym-gold transition duration-300">
                                    Salvar Cadastro
                                </button>
                                <button type="button" id="btnCancelar" class="hidden flex-1 bg-zinc-700 text-white py-3 px-4 rounded-lg shadow-lg text-xs font-black uppercase hover:bg-zinc-600 transition">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="w-full lg:w-2/3">
                    <div class="bg-gym-black rounded-xl shadow-xl border border-zinc-800 overflow-hidden">
                        <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                            <h3 class="text-lg font-black text-white uppercase italic">Gerenciar <span class="text-gym-gold">Matrículas</span></h3>
                            <button onclick="carregarCharadas()" class="text-gym-gold hover:text-white text-xs font-black uppercase transition tracking-widest">
                                <i class="fas fa-sync-alt mr-2"></i> Sincronizar
                            </button>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="min-w-full">
                                <thead>
                                    <tr class="bg-zinc-900">
                                        <th class="px-6 py-4 text-left text-xs font-black text-zinc-500 uppercase tracking-widest">Documento</th>
                                        <th class="px-6 py-4 text-left text-xs font-black text-zinc-500 uppercase tracking-widest">Nome do Aluno</th>
                                        <th class="px-6 py-4 text-right text-xs font-black text-zinc-500 uppercase tracking-widest">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaCharadas" class="divide-y divide-zinc-800">
                                    </tbody>
                                    
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="funcionario.js"></script>
</body>
</html>
