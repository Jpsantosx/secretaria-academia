<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Titan Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-gym-black { background-color: #111111; }
        .bg-gym-gold { background-color: #FFC107; }
        .text-gym-gold { color: #FFC107; }
        .table-row:hover { background-color: #1a1a1a; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen text-gray-200">

    <nav class="bg-gym-black border-b border-zinc-800 shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-20 items-center">
            <div class="flex items-center gap-4">
                <span class="font-black text-2xl text-white">Titan<span class="text-gym-gold">Gym</span></span>
            </div>
            <div id="userInfo" class="hidden flex items-center gap-6">
                <button onclick="logout()" class="bg-gym-gold px-6 py-2 text-black text-xs font-bold uppercase">Sair</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-10">
        <div id="loginSection" class="max-w-md mx-auto bg-gym-black p-10 mt-10 border border-zinc-800">
            <h2 class="text-2xl font-bold text-white mb-6 uppercase tracking-tighter">Login Administrativo</h2>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="usuario" placeholder="Usuário" required class="w-full p-3 bg-zinc-800 border border-zinc-700 text-white outline-none focus:border-gym-gold">
                <input type="password" id="password" placeholder="Senha" required class="w-full p-3 bg-zinc-800 border border-zinc-700 text-white outline-none focus:border-gym-gold">
                <button type="submit" class="w-full bg-gym-gold p-3 text-black font-black uppercase hover:bg-yellow-500 transition-colors">Entrar</button>
            </form>
        </div>

        <div id="adminSection" class="hidden space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gym-black p-6 border border-zinc-800">
                    <p class="text-zinc-500 text-xs font-bold uppercase">Total de alunos</p>
                    <p id="totalClientes" class="text-4xl font-black text-gym-gold">0</p>
                </div>
            </div>

            <div class="flex gap-8 flex-col lg:flex-row">
                <div class="w-full lg:w-1/3">
                    <form id="clienteForm" class="space-y-4 bg-gym-black p-6 border border-zinc-800">
                        <h3 class="text-white font-bold uppercase text-sm mb-4">Cadastrar Novo Aluno</h3>
                        <input type="text" id="cpf" placeholder="CPF (Somente números)" required class="w-full p-3 bg-zinc-800 text-white border border-zinc-700 outline-none">
                        <input type="text" id="nome" placeholder="Nome Completo" required class="w-full p-3 bg-zinc-800 text-white border border-zinc-700 outline-none">
                        <select id="autorizado" class="w-full p-3 bg-zinc-800 text-white border border-zinc-700 outline-none">
                            <option value="true">Ativo / Liberado</option>
                            <option value="false">Bloqueado</option>
                        </select>
                        <button type="submit" class="w-full bg-gym-gold p-3 text-black font-black uppercase">Salvar Aluno</button>
                    </form>
                </div>

                <div class="w-full lg:w-2/3 bg-gym-black p-6 border border-zinc-800">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-white font-bold uppercase text-sm">Lista de Clientes</h3>
                        <button onclick="carregarClientes()" class="text-gym-gold text-xs font-bold uppercase hover:underline">Atualizar Dados</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-zinc-500 text-xs uppercase border-b border-zinc-800">
                                    <th class="pb-3">CPF</th>
                                    <th class="pb-3">Nome</th>
                                    <th class="pb-3">Status</th>
                                    <th class="pb-3 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaClientes" class="text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
