```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Titan Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        .bg-gym-black { background-color: #111111; }
        .bg-gym-gold { background-color: #FFC107; }
        .text-gym-gold { color: #FFC107; }
        .border-gym-gold { border-color: #FFC107; }
        .hover-gym-gold:hover { background-color: #e6af06; }
    </style>
</head>

<body class="bg-zinc-900 min-h-screen text-gray-200">

    <!-- NAVBAR -->
    <nav class="bg-gym-black border-b border-zinc-800 shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-20 items-center">

            <div class="flex items-center gap-4">
                <img src="ACADEMIA LOGO.png" class="h-12">
                <span class="font-black text-2xl text-white">
                    Titan<span class="text-gym-gold">Gym</span>
                </span>
            </div>

            <div id="userInfo" class="hidden flex items-center gap-6">
                <span id="userEmail" class="text-sm text-zinc-400"></span>
                <button id="btnLogout" class="bg-gym-gold px-6 py-2 text-black text-xs font-bold">
                    Sair
                </button>
            </div>

        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-10">

        <!-- LOGIN -->
        <div id="loginSection" class="max-w-md mx-auto bg-gym-black p-10 mt-10">

            <h2 class="text-2xl text-white mb-6">Login</h2>

            <form id="loginForm" class="space-y-4">
                <input type="text" id="usuario" placeholder="Usuário" required class="w-full p-3 bg-zinc-800 text-white">
                <input type="password" id="password" placeholder="Senha" required class="w-full p-3 bg-zinc-800 text-white">

                <button class="w-full bg-gym-gold p-3 text-black font-bold">
                    Entrar
                </button>

                <div id="loginError" class="hidden text-red-500 text-sm">
                    Credenciais inválidas
                </div>
            </form>
        </div>

        <!-- PAINEL -->
        <div id="adminSection" class="hidden space-y-8">

            <!-- CARD TOTAL -->
            <div class="bg-gym-black p-6">
                <p>Total de alunos</p>
                <p id="totalClientes" class="text-2xl">0</p>
            </div>

            <div class="flex gap-8 flex-col lg:flex-row">

                <!-- FORM -->
                <div class="w-full lg:w-1/3">
                    <form id="clienteForm" class="space-y-4 bg-gym-black p-6">

                        <input type="hidden" id="clienteId">

                        <input type="text" id="cpf" placeholder="CPF (somente números)" required class="w-full p-3 bg-zinc-800 text-white">

                        <input type="text" id="nome" placeholder="Nome" required class="w-full p-3 bg-zinc-800 text-white">

                        <select id="autorizado" class="w-full p-3 bg-zinc-800 text-white">
                            <option value="true">Ativo</option>
                            <option value="false">Bloqueado</option>
                        </select>

                        <button type="submit" class="w-full bg-gym-gold p-3 text-black font-bold">
                            Salvar
                        </button>

                        <button type="button" id="btnCancelar" class="hidden w-full bg-zinc-700 p-3">
                            Cancelar
                        </button>

                    </form>
                </div>

                <!-- TABELA -->
                <div class="w-full lg:w-2/3 bg-gym-black p-6">

                    <div class="flex justify-between mb-4">
                        <h3>Clientes</h3>
                        <button onclick="carregarClientes()" class="text-gym-gold">
                            Atualizar
                        </button>
                    </div>

                    <table class="w-full">
                        <thead>
                            <tr>
                                <th>CPF</th>
                                <th>Nome</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="tabelaClientes">
                        </tbody>
                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
```
